name : Job Outputs
on : push
jobs :
  job1 :
    runs-on: ubuntu-latest
    outputs :
      output1 : ${{steps.varun.outputs.value}}

    steps:
      - id: varun
        run : echo "value=52"

  job2 :
    runs-on: ubuntu-latest
    needs: job1

    steps:
      - run : echo "Value from job1 = ${{needs.job1.outputs.output1}}"